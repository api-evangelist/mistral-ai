aid: mistral-ai
name: Mistral AI
description: Mistral AI is a French artificial intelligence company that develops
  and provides frontier large language models and APIs for developers and enterprises.
  Their developer platform offers APIs for chat completions, embeddings, fine-tuning,
  OCR, batch processing, and agentic workflows, enabling teams to build sophisticated
  AI-powered applications.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/mistral-ai/refs/heads/main/apis.yml
tags:
- Agents
