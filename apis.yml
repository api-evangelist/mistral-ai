aid: mistral-ai
url: https://raw.githubusercontent.com/api-evangelist/mistral-ai/refs/heads/main/apis.yml
modified: '2026-03-24'
apis:
  - aid: mistral-ai:chat-completions-api
    name: Mistral AI Chat Completions API
    tags:
      - Artificial Intelligence
      - Chat
      - Completions
      - Large Language Models
      - Conversational AI
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.mistral.ai/v1
    humanURL: https://docs.mistral.ai/api/endpoint/chat
    properties:
      - url: https://docs.mistral.ai/api/endpoint/chat
        type: Documentation
      - url: openapi/mistral-ai-chat-completions-openapi.yml
        type: OpenAPI
    description: >-
      The Mistral AI Chat Completions API enables developers to interact with
      Mistral's language models in a conversational manner. It supports
      multi-turn conversations, function calling, and JSON mode for structured
      outputs. The API provides access to a range of models including Mistral
      Large, Mistral Small, and Codestral, each optimized for different use
      cases from general reasoning to code generation.
  - aid: mistral-ai:embeddings-api
    name: Mistral AI Embeddings API
    tags:
      - Artificial Intelligence
      - Embeddings
      - Vector Search
      - Semantic Search
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.mistral.ai/v1
    humanURL: https://docs.mistral.ai/capabilities/embeddings
    properties:
      - url: https://docs.mistral.ai/capabilities/embeddings
        type: Documentation
      - url: openapi/mistral-ai-embeddings-openapi.yml
        type: OpenAPI
    description: >-
      The Mistral AI Embeddings API allows developers to compute document and
      text embeddings using Mistral's embedding models. These embeddings can
      be used for semantic search, clustering, classification, and retrieval
      augmented generation workflows. The API accepts text inputs and returns
      high-dimensional vector representations suitable for a variety of
      natural language processing tasks.
  - aid: mistral-ai:agents-api
    name: Mistral AI Agents API
    tags:
      - Artificial Intelligence
      - Agents
      - Agentic Workflows
      - Automation
      - Orchestration
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.mistral.ai/v1
    humanURL: https://docs.mistral.ai/api/endpoint/agents
    properties:
      - url: https://docs.mistral.ai/api/endpoint/agents
        type: Documentation
      - url: openapi/mistral-ai-agents-openapi.yml
        type: OpenAPI
    description: >-
      The Mistral AI Agents API provides a dedicated framework for building
      agentic applications. It complements the Chat Completion API by enabling
      AI agents to handle complex tasks, maintain context across interactions,
      and coordinate multiple actions. Developers can create agents with
      specific configurations, tools, and instructions, making it suitable for
      enterprise-grade agentic platforms and multi-step workflow automation.
  - aid: mistral-ai:fine-tuning-api
    name: Mistral AI Fine-Tuning API
    tags:
      - Artificial Intelligence
      - Fine-Tuning
      - Model Training
      - Machine Learning
      - Customization
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.mistral.ai/v1
    humanURL: https://docs.mistral.ai/api/endpoint/fine-tuning
    properties:
      - url: https://docs.mistral.ai/api/endpoint/fine-tuning
        type: Documentation
      - url: openapi/mistral-ai-fine-tuning-openapi.yml
        type: OpenAPI
    description: >-
      The Mistral AI Fine-Tuning API allows developers to create and manage
      fine-tuning jobs that customize Mistral models on proprietary datasets.
      Users can upload training data, configure hyperparameters, and monitor
      job progress through the API. Fine-tuned models can then be deployed
      and accessed through the Chat Completions endpoint, enabling domain-
      specific performance improvements for enterprise applications.
  - aid: mistral-ai:ocr-api
    name: Mistral AI OCR API
    tags:
      - Artificial Intelligence
      - OCR
      - Document AI
      - Text Extraction
      - PDF Processing
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.mistral.ai/v1
    humanURL: https://docs.mistral.ai/api/endpoint/ocr
    properties:
      - url: https://docs.mistral.ai/api/endpoint/ocr
        type: Documentation
      - url: openapi/mistral-ai-ocr-openapi.yml
        type: OpenAPI
    description: >-
      The Mistral AI OCR API provides optical character recognition capabilities
      powered by the mistral-ocr-latest model. It can extract text and structured
      content from PDF documents and images, comprehending complex document
      elements including media, tables, equations, and interleaved text. The API
      returns ordered, structured content suitable for downstream processing and
      retrieval augmented generation pipelines.
  - aid: mistral-ai:models-api
    name: Mistral AI Models API
    tags:
      - Artificial Intelligence
      - Models
      - Model Management
      - Infrastructure
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.mistral.ai/v1
    humanURL: https://docs.mistral.ai/api/endpoint/models
    properties:
      - url: https://docs.mistral.ai/api/endpoint/models
        type: Documentation
      - url: openapi/mistral-ai-models-openapi.yml
        type: OpenAPI
    description: >-
      The Mistral AI Models API provides endpoints for listing and retrieving
      information about available models on the Mistral platform. Developers
      can query which models are accessible, inspect model capabilities and
      metadata, and manage fine-tuned model deployments. This API serves as the
      foundation for model discovery and lifecycle management within the Mistral
      ecosystem.
  - aid: mistral-ai:forge-api
    name: Mistral AI Forge API
    tags:
      - Artificial Intelligence
      - Model Training
      - Pre-Training
      - Reinforcement Learning
      - Enterprise AI
      - Agentic Workflows
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.mistral.ai
    humanURL: https://mistral.ai/news/forge
    properties:
      - url: https://mistral.ai/news/forge
        type: Documentation
      - url: openapi/mistral-ai-forge-openapi.yml
        type: OpenAPI
    description: >-
      Mistral AI Forge is a model-training platform providing a unified API for
      the entire model lifecycle from pre-training to reinforcement learning.
      Forge enables enterprises to build frontier-grade AI models grounded in
      proprietary knowledge, supporting pre-training on large internal datasets,
      post-training through supervised fine-tuning with DPO and ODPO, and
      reinforcement learning pipelines for aligning models with internal policies.
      Forge is optimized for agentic workflows, allowing AI agents to
      programmatically schedule training jobs, optimize hyperparameters, and
      generate synthetic data. The platform supports both Dense and
      Mixture-of-Experts model architectures with serverless infrastructure.
  - aid: mistral-ai:batch-api
    name: Mistral AI Batch API
    tags:
      - Artificial Intelligence
      - Batch Processing
      - Asynchronous
      - Large Scale
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.mistral.ai/v1
    humanURL: https://docs.mistral.ai/capabilities/batch
    properties:
      - url: https://docs.mistral.ai/capabilities/batch
        type: Documentation
      - url: openapi/mistral-ai-batch-openapi.yml
        type: OpenAPI
    description: >-
      The Mistral AI Batch API enables developers to submit large volumes of
      requests for asynchronous processing at reduced cost. It is designed for
      workloads that do not require real-time responses, such as bulk text
      classification, large-scale content generation, and data processing
      pipelines. Developers can submit batch jobs, monitor their progress,
      and retrieve results once processing is complete.
