"""
Mistral AI GraphQL Schema
Derived from the Mistral AI REST API (https://docs.mistral.ai/api/)
Covers chat completions, embeddings, FIM, agents, models, fine-tuning, OCR, and batch operations.
"""

# ─── Scalar types ────────────────────────────────────────────────────────────

scalar DateTime
scalar JSON
scalar Float32

# ─── Enumerations ────────────────────────────────────────────────────────────

enum ModelPurpose {
  CHAT
  EMBEDDING
  CODE
  VISION
  OCR
  FINE_TUNING
  GENERAL
}

enum ModelStatus {
  AVAILABLE
  DEPRECATED
  BETA
  EXPERIMENTAL
  RETIRED
}

enum MessageRole {
  SYSTEM
  USER
  ASSISTANT
  TOOL
}

enum FinishReason {
  STOP
  LENGTH
  TOOL_CALLS
  CONTENT_FILTER
  ERROR
}

enum Severity {
  NONE
  LOW
  MEDIUM
  HIGH
  CRITICAL
}

enum FineTuningJobStatus {
  QUEUED
  STARTED
  RUNNING
  FAILED
  SUCCESS
  CANCELLED
  CANCELLATION_REQUESTED
}

enum BatchJobStatus {
  QUEUED
  RUNNING
  SUCCESS
  FAILED
  TIMEOUT_EXCEEDED
  CANCELLATION_REQUESTED
  CANCELLED
}

enum ResponseFormatType {
  TEXT
  JSON_OBJECT
}

enum ToolChoiceMode {
  AUTO
  NONE
  ANY
  REQUIRED
}

enum EmbeddingEncoding {
  FLOAT
  BASE64
}

enum OCRDocumentType {
  PDF
  IMAGE
}

enum AgentStatus {
  ACTIVE
  INACTIVE
  ARCHIVED
}

# ─── Model types ─────────────────────────────────────────────────────────────

"""Core representation of a Mistral model."""
type Model {
  id: ID!
  name: String!
  description: String
  details: ModelDetails!
  capabilities: ModelCapabilities!
  status: ModelStatus!
  created: DateTime!
  ownedBy: String!
  permission: [ModelPermission!]!
  purpose: [ModelPurpose!]!
}

"""Detailed technical metadata for a Mistral model."""
type ModelDetails {
  modelId: String!
  version: String
  contextLength: ContextLength!
  parameters: ModelParameters
  size: ModelSize
  vocabSize: VocabSize
  architectureFamily: String
  quantization: String
  deprecationDate: DateTime
}

"""Capability flags indicating what a model can do."""
type ModelCapabilities {
  completion: Boolean!
  chatCompletion: Boolean!
  functionCalling: Boolean!
  fineTuning: Boolean!
  vision: Boolean!
  jsonMode: Boolean!
  embedding: Boolean!
  codeCompletion: Boolean!
  streaming: Boolean!
}

"""Context window limits for a model."""
type ContextLength {
  maxInputTokens: Int!
  maxOutputTokens: Int!
  totalContextWindow: Int!
}

"""Parameter count information for a model."""
type ModelParameters {
  total: String
  active: String
  experts: Int
  expertsPerToken: Int
}

"""Size category descriptor for a model."""
type ModelSize {
  category: String!
  parameterCount: String
  description: String
}

"""Vocabulary size information for a model."""
type VocabSize {
  tokenCount: Int!
  byteLevelBPE: Boolean!
}

"""Access and usage permissions for a model."""
type ModelPermission {
  id: ID!
  object: String!
  created: DateTime!
  allowCreateEngine: Boolean!
  allowSampling: Boolean!
  allowLogprobs: Boolean!
  allowSearchIndices: Boolean!
  allowView: Boolean!
  allowFineTuning: Boolean!
  organization: String
  group: String
  isBlocking: Boolean!
}

# ─── Chat message types ───────────────────────────────────────────────────────

"""Union of all message types that can appear in a conversation."""
union ChatMessage = SystemMessage | UserMessage | AssistantMessage | ToolMessage

"""System-level instruction message."""
type SystemMessage {
  role: MessageRole!
  content: String!
  name: String
}

"""A message from the human user."""
type UserMessage {
  role: MessageRole!
  content: String!
  name: String
}

"""A response message generated by the model."""
type AssistantMessage {
  role: MessageRole!
  content: String
  toolCalls: [ToolCall!]
  name: String
  prefix: Boolean
}

"""The result returned after a tool invocation."""
type ToolMessage {
  role: MessageRole!
  content: String!
  toolCallId: String!
  name: String
}

# ─── Chat completion types ────────────────────────────────────────────────────

"""A complete response from the chat completions endpoint."""
type ChatCompletion {
  id: ID!
  object: String!
  created: DateTime!
  model: String!
  choices: [Choice!]!
  usage: Usage!
}

"""A single completion choice returned by the model."""
type Choice {
  index: Int!
  message: AssistantMessage!
  finishReason: FinishReason
  logprobs: LogprobContent
}

"""Incremental content delta for streaming responses."""
type ChatCompletionDelta {
  role: MessageRole
  content: String
  toolCalls: [ToolCall!]
}

"""A server-sent event emitted during streaming."""
type StreamEvent {
  id: ID!
  object: String!
  created: DateTime!
  model: String!
  choices: [StreamChoice!]!
  usage: Usage
}

"""A partial choice object within a streaming event."""
type StreamChoice {
  index: Int!
  delta: ChatCompletionDelta!
  finishReason: FinishReason
  logprobs: LogprobContent
}

# ─── Usage and token types ────────────────────────────────────────────────────

"""Token usage summary for a request."""
type Usage {
  promptTokens: Int!
  completionTokens: Int!
  totalTokens: Int!
}

"""Detailed token usage statistics."""
type TokenUsage {
  inputTokens: Int!
  outputTokens: Int!
  cachedTokens: Int
  reasoningTokens: Int
}

"""Log-probability information for generated tokens."""
type Logprob {
  token: String!
  logprob: Float!
  bytes: [Int!]
}

"""Container for log-probability content of a choice."""
type LogprobContent {
  content: [TopLogprob!]
}

"""Top-K log-probability candidates for a token position."""
type TopLogprob {
  token: String!
  logprob: Float!
  bytes: [Int!]
  topLogprobs: [Logprob!]
}

# ─── Embedding types ──────────────────────────────────────────────────────────

"""A single embedding vector with associated metadata."""
type Embedding {
  index: Int!
  object: String!
  embedding: [Float!]!
}

"""The full response from the embeddings endpoint."""
type EmbeddingResponse {
  id: ID!
  object: String!
  data: [EmbeddingData!]!
  model: String!
  usage: Usage!
}

"""An individual embedding data element."""
type EmbeddingData {
  index: Int!
  embedding: [Float!]!
  object: String!
}

"""Textual input for an embeddings request."""
type TextInput {
  text: String!
  encoding: EmbeddingEncoding
}

"""Tokenized representation of text input."""
type Tokens {
  tokenIds: [Int!]!
  count: Int!
}

"""A dense numerical vector."""
type VectorData {
  values: [Float!]!
  dimensions: Int!
}

# ─── Fill-In-the-Middle (FIM) types ──────────────────────────────────────────

"""Request payload for fill-in-the-middle (code completion) requests."""
type FIMRequest {
  model: String!
  prompt: String!
  suffix: String
  maxTokens: Int
  temperature: Float
  topP: Float
  stop: [String!]
  stream: Boolean
}

"""Response from the FIM (code completion) endpoint."""
type FIMCompletion {
  id: ID!
  object: String!
  created: DateTime!
  model: String!
  choices: [FIMChoice!]!
  usage: Usage!
}

"""A single completion choice from a FIM response."""
type FIMChoice {
  index: Int!
  text: String!
  finishReason: FinishReason
  delta: FIMDelta
}

"""Incremental delta for a streaming FIM response."""
type FIMDelta {
  text: String
}

# ─── Tool and function types ──────────────────────────────────────────────────

"""A tool available to the model during a chat session."""
type Tool {
  type: String!
  function: FunctionDefinition!
}

"""A callable function exposed as a tool."""
type Function {
  name: String!
  description: String
  parameters: FunctionParameters!
  strict: Boolean
}

"""Metadata describing a tool's callable function."""
type FunctionDefinition {
  name: String!
  description: String
  parameters: JSONSchema
}

"""Parameter schema for a function definition."""
type FunctionParameters {
  type: String!
  properties: JSON
  required: [String!]
  additionalProperties: Boolean
}

"""A tool invocation requested by the model."""
type ToolCall {
  id: ID!
  type: String!
  function: FunctionCall!
}

"""The result of executing a tool call."""
type ToolCallResult {
  toolCallId: String!
  content: String!
  isError: Boolean
}

"""The function name and arguments within a tool call."""
type FunctionCall {
  name: String!
  arguments: String!
}

"""Parsed and structured arguments from a function call."""
type ParsedArgs {
  raw: String!
  parsed: JSON
  valid: Boolean!
}

"""A JSON Schema definition used for structured output or tool parameters."""
type JSONSchema {
  type: String
  properties: JSON
  required: [String!]
  additionalProperties: Boolean
  description: String
  enum: [String!]
  format: String
  items: JSON
}

# ─── Safety and moderation types ─────────────────────────────────────────────

"""Safety filter applied to model inputs and outputs."""
type SafetyFilter {
  id: ID!
  name: String!
  enabled: Boolean!
  categories: [Category!]!
}

"""Configuration for safeguards on a model or agent."""
type SafeguardConfig {
  safePrompt: Boolean!
  filters: [SafetyFilter!]!
  contentPolicy: ContentPolicy
}

"""Content moderation policy applied to requests."""
type ContentPolicy {
  blockHateSpeech: Boolean!
  blockSelfHarm: Boolean!
  blockSexualContent: Boolean!
  blockViolence: Boolean!
  blockIllegalActivity: Boolean!
}

"""Moderation classification result for a piece of content."""
type ModerationResult {
  flagged: Boolean!
  categories: [CategoryScore!]!
  overallSeverity: Severity!
}

"""A moderation category with an associated confidence score."""
type CategoryScore {
  category: Category!
  score: Float!
  severity: Severity!
  flagged: Boolean!
}

"""A named moderation or harm category."""
type Category {
  id: ID!
  name: String!
  description: String
}

# ─── Response format types ────────────────────────────────────────────────────

"""Controls the format of the model's response."""
type ResponseFormat {
  type: ResponseFormatType!
}

"""A JSON-structured response from the model."""
type JSONResponse {
  content: JSON!
  raw: String!
}

"""A plain text response from the model."""
type TextResponse {
  content: String!
}

# ─── API key and client types ─────────────────────────────────────────────────

"""An API key for authenticating with the Mistral platform."""
type APIKey {
  id: ID!
  name: String!
  key: String
  createdAt: DateTime!
  lastUsedAt: DateTime
  expiresAt: DateTime
  scopes: [String!]!
  active: Boolean!
}

"""Client configuration for accessing the Mistral API."""
type APIClient {
  baseUrl: String!
  apiVersion: String!
  defaultModel: String
  timeoutMs: Int
  maxRetries: Int
  headers: JSON
}

# ─── Usage statistics and rate limiting ──────────────────────────────────────

"""Aggregated usage statistics for an account or period."""
type UsageStat {
  period: String!
  inputTokens: Int!
  outputTokens: Int!
  totalTokens: Int!
  requestCount: Int!
  modelBreakdown: [ModelUsageStat!]!
}

"""Per-model breakdown within a usage stat record."""
type ModelUsageStat {
  modelId: String!
  inputTokens: Int!
  outputTokens: Int!
  requestCount: Int!
}

"""Rate limit information returned in API response headers."""
type RateLimit {
  requestsPerMinute: Int!
  tokensPerMinute: Int!
  requestsRemaining: Int
  tokensRemaining: Int
  resetAt: DateTime
}

# ─── Fine-tuning types ────────────────────────────────────────────────────────

"""A fine-tuning job submitted to the Mistral platform."""
type FineTuningJob {
  id: ID!
  model: String!
  status: FineTuningJobStatus!
  createdAt: DateTime!
  finishedAt: DateTime
  fineTunedModel: String
  trainingFile: String!
  validationFile: String
  hyperparameters: FineTuningHyperparameters
  trainedTokens: Int
  integrations: [FineTuningIntegration!]
  suffix: String
  events: [FineTuningEvent!]
}

"""Hyperparameter configuration for a fine-tuning job."""
type FineTuningHyperparameters {
  trainingSteps: Int
  learningRate: Float
  warmupFraction: Float
  epochs: Float
  weightDecay: Float
  loraRank: Int
  loraAlpha: Float
  loraDropout: Float
  seqLen: Int
  classifierTargets: [String!]
  classifierWeights: [Float!]
}

"""An event log entry for a fine-tuning job."""
type FineTuningEvent {
  name: String!
  createdAt: DateTime!
  data: JSON
}

"""External integration configuration for a fine-tuning job."""
type FineTuningIntegration {
  type: String!
  project: String
  name: String
  apiKey: String
}

# ─── Batch job types ──────────────────────────────────────────────────────────

"""A batch processing job submitted to the Mistral platform."""
type BatchJob {
  id: ID!
  inputFiles: [String!]!
  endpoint: String!
  model: String!
  status: BatchJobStatus!
  errors: [BatchError!]!
  createdAt: DateTime!
  completedAt: DateTime
  totalRequests: Int!
  completedRequests: Int
  failedRequests: Int
  outputFile: String
  errorFile: String
  metadata: JSON
}

"""An error record within a batch job."""
type BatchError {
  count: Int!
  line: Int
  error: String!
  message: String
}

# ─── OCR types ────────────────────────────────────────────────────────────────

"""A document submitted to the OCR endpoint."""
type OCRDocument {
  type: OCRDocumentType!
  url: String
  base64: String
  mimeType: String
}

"""The structured response from the OCR endpoint."""
type OCRResponse {
  id: ID!
  model: String!
  pages: [OCRPage!]!
  usageInfo: OCRUsage!
}

"""A single page of content extracted by OCR."""
type OCRPage {
  index: Int!
  markdown: String!
  images: [OCRImage!]
  dimensions: OCRDimensions
}

"""An image extracted from a page during OCR."""
type OCRImage {
  id: String!
  topLeftX: Float!
  topLeftY: Float!
  bottomRightX: Float!
  bottomRightY: Float!
  imageBase64: String
}

"""Pixel dimensions of an OCR page."""
type OCRDimensions {
  dpi: Int!
  height: Int!
  width: Int!
}

"""Token usage statistics for an OCR request."""
type OCRUsage {
  pagesProcessed: Int!
  docSizeBytes: Int!
}

# ─── Agent types ──────────────────────────────────────────────────────────────

"""A configured Mistral agent."""
type Agent {
  id: ID!
  name: String!
  description: String
  model: String!
  instructions: String
  tools: [Tool!]!
  status: AgentStatus!
  createdAt: DateTime!
  updatedAt: DateTime
  responseFormat: ResponseFormat
  temperature: Float
  topP: Float
}

"""A conversation thread associated with an agent."""
type AgentConversation {
  id: ID!
  agentId: String!
  messages: [ChatMessage!]!
  createdAt: DateTime!
  updatedAt: DateTime
}

# ─── Query, Mutation, Subscription ───────────────────────────────────────────

type Query {
  """List all available models."""
  models: [Model!]!

  """Retrieve a specific model by ID."""
  model(id: ID!): Model

  """List fine-tuning jobs."""
  fineTuningJobs(
    page: Int
    pageSize: Int
    model: String
    status: FineTuningJobStatus
  ): [FineTuningJob!]!

  """Retrieve a specific fine-tuning job."""
  fineTuningJob(id: ID!): FineTuningJob

  """List batch jobs."""
  batchJobs(
    page: Int
    pageSize: Int
    status: BatchJobStatus
    model: String
  ): [BatchJob!]!

  """Retrieve a specific batch job."""
  batchJob(id: ID!): BatchJob

  """List API keys for the authenticated account."""
  apiKeys: [APIKey!]!

  """Retrieve usage statistics for a given period."""
  usageStats(from: DateTime!, to: DateTime!, groupBy: String): [UsageStat!]!

  """List configured agents."""
  agents(page: Int, pageSize: Int): [Agent!]!

  """Retrieve a specific agent."""
  agent(id: ID!): Agent
}

type Mutation {
  """Submit a chat completion request."""
  createChatCompletion(input: ChatCompletionInput!): ChatCompletion!

  """Compute embeddings for one or more inputs."""
  createEmbedding(input: EmbeddingInput!): EmbeddingResponse!

  """Submit a fill-in-the-middle (code completion) request."""
  createFIMCompletion(input: FIMInput!): FIMCompletion!

  """Submit a document to OCR processing."""
  createOCR(input: OCRInput!): OCRResponse!

  """Create a new fine-tuning job."""
  createFineTuningJob(input: FineTuningJobInput!): FineTuningJob!

  """Cancel a running fine-tuning job."""
  cancelFineTuningJob(id: ID!): FineTuningJob!

  """Submit a new batch job."""
  createBatchJob(input: BatchJobInput!): BatchJob!

  """Cancel a running batch job."""
  cancelBatchJob(id: ID!): BatchJob!

  """Create a new API key."""
  createAPIKey(name: String!, scopes: [String!]): APIKey!

  """Delete an API key."""
  deleteAPIKey(id: ID!): Boolean!

  """Create a new agent."""
  createAgent(input: AgentInput!): Agent!

  """Update an existing agent."""
  updateAgent(id: ID!, input: AgentInput!): Agent!

  """Delete an agent."""
  deleteAgent(id: ID!): Boolean!
}

type Subscription {
  """Stream chat completion tokens as they are generated."""
  chatCompletionStream(input: ChatCompletionInput!): StreamEvent!

  """Stream FIM tokens as they are generated."""
  fimCompletionStream(input: FIMInput!): StreamEvent!

  """Watch a fine-tuning job for status and event updates."""
  fineTuningJobUpdates(id: ID!): FineTuningJob!

  """Watch a batch job for progress updates."""
  batchJobUpdates(id: ID!): BatchJob!
}

# ─── Input types ─────────────────────────────────────────────────────────────

input ChatCompletionInput {
  model: String!
  messages: [MessageInput!]!
  temperature: Float
  topP: Float
  maxTokens: Int
  minTokens: Int
  stream: Boolean
  stop: [String!]
  randomSeed: Int
  responseFormat: ResponseFormatInput
  tools: [ToolInput!]
  toolChoice: ToolChoiceMode
  presencePenalty: Float
  frequencyPenalty: Float
  n: Int
  safePrompt: Boolean
  logprobs: Boolean
  topLogprobs: Int
}

input MessageInput {
  role: MessageRole!
  content: String!
  toolCallId: String
  toolCalls: [ToolCallInput!]
  name: String
}

input ToolCallInput {
  id: ID!
  type: String!
  function: FunctionCallInput!
}

input FunctionCallInput {
  name: String!
  arguments: String!
}

input ToolInput {
  type: String!
  function: FunctionDefinitionInput!
}

input FunctionDefinitionInput {
  name: String!
  description: String
  parameters: JSON
  strict: Boolean
}

input ResponseFormatInput {
  type: ResponseFormatType!
}

input EmbeddingInput {
  model: String!
  inputs: [String!]!
  encodingFormat: EmbeddingEncoding
}

input FIMInput {
  model: String!
  prompt: String!
  suffix: String
  maxTokens: Int
  temperature: Float
  topP: Float
  stop: [String!]
  stream: Boolean
  randomSeed: Int
}

input OCRInput {
  model: String!
  document: OCRDocumentInput!
  pages: [Int!]
  includeImageBase64: Boolean
}

input OCRDocumentInput {
  type: OCRDocumentType!
  url: String
  base64: String
  mimeType: String
}

input FineTuningJobInput {
  model: String!
  trainingFile: String!
  validationFile: String
  hyperparameters: FineTuningHyperparametersInput
  suffix: String
  integrations: [FineTuningIntegrationInput!]
}

input FineTuningHyperparametersInput {
  trainingSteps: Int
  learningRate: Float
  warmupFraction: Float
  epochs: Float
  weightDecay: Float
  loraRank: Int
  loraAlpha: Float
  loraDropout: Float
  seqLen: Int
}

input FineTuningIntegrationInput {
  type: String!
  project: String
  name: String
  apiKey: String
}

input BatchJobInput {
  inputFiles: [String!]!
  endpoint: String!
  model: String!
  metadata: JSON
  timeoutHours: Int
}

input AgentInput {
  name: String!
  description: String
  model: String!
  instructions: String
  tools: [ToolInput!]
  responseFormat: ResponseFormatInput
  temperature: Float
  topP: Float
}
