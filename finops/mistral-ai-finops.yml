providerId: mistral-ai
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Cost Management
  - AI
  - Large Language Models
description: 'FOCUS-aligned FinOps for Mistral AI: dual model — token-based pay-as-you-go pricing on
  la Plateforme (per-million-token input/output rates per model) and tiered per-user subscriptions for
  Le Chat (Free, Pro $14.99, Team $24.99, Enterprise custom). Mistral AI Studio adds a custom enterprise
  contract for production deployments.'
sources:
  - https://mistral.ai/pricing
  - https://docs.mistral.ai/getting-started/models/models_overview/
  - https://mistral.ai/products/la-plateforme
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Mistral AI
serviceCategory: AI Infrastructure
billingModel:
  pricingCategory: Token-Based Usage + Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Mistral AI
  ServiceCategory: AI Infrastructure
  ServiceSubcategory: Large Language Models
  ProviderName: Mistral AI
  PublisherName: Mistral AI
  InvoiceIssuerName: Mistral AI
  BillingCurrency: USD
