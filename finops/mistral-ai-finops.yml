meters:
  - name: tokens_input
    unit: token
    aggregation: sum
    dimensions:
      - model
      - workspace
      - api_key
  - name: tokens_output
    unit: token
    aggregation: sum
    dimensions:
      - model
      - workspace
      - api_key
  - name: voxtral_audio_minutes
    unit: minute
    aggregation: sum
    dimensions:
      - model
      - workspace
  - name: ocr_pages
    unit: page
    aggregation: sum
    dimensions:
      - model
      - workspace
  - name: le_chat_pro_seats
    unit: seat-month
    aggregation: sum
    dimensions:
      - account
  - name: le_chat_team_seats
    unit: seat-month
    aggregation: sum
    dimensions:
      - account
      - assigned_user
  - name: studio_contract
    unit: contract-year
    aggregation: count
    dimensions:
      - account
principles:
  - name: Visibility
    description: Pull token consumption from the la Plateforme usage console / API; export per-key,
      per-model breakdowns; correlate with invoice charges.
  - name: Allocation
    description: Issue one API key per consuming product / team and tag spending by key; allocate
      Le Chat Team seats by Entra ID / IdP group.
  - name: Optimization
    description: Right-size models — use Ministral 3B / Small 4 for cheap throughput and reserve Large 3
      / Magistral for high-value reasoning; cap reasoning-effort to control output-token spikes; consider
      self-hosting Mistral open-weight models for sustained high-volume workloads to avoid per-token
      charges.
  - name: Accountability
    description: Assign a budget owner per API key; review token consumption weekly; alert when token
      spend deviates >25% from forecast.
maintainers: []
