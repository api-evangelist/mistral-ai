naftiko: 1.0.0-alpha2
info:
  label: Mistral AI Chat Completions API — Chat Completions
  description: 'Mistral AI Chat Completions API — Chat Completions. 1 operations. Lead operation: Create chat completion.
    Self-contained Naftiko capability covering one Mistral Ai business surface.'
  tags:
  - Mistral Ai
  - Chat Completions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MISTRAL_AI_API_KEY: MISTRAL_AI_API_KEY
capability:
  consumes:
  - type: http
    namespace: chat-completions-chat-completions
    baseUri: https://api.mistral.ai/v1
    description: Mistral AI Chat Completions API — Chat Completions business capability. Self-contained, no shared references.
    resources:
    - name: chat-completions
      path: /chat/completions
      operations:
      - name: createchatcompletion
        method: POST
        description: Create chat completion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MISTRAL_AI_API_KEY}}'
  exposes:
  - type: rest
    namespace: chat-completions-chat-completions-rest
    port: 8080
    description: REST adapter for Mistral AI Chat Completions API — Chat Completions. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/chat/completions
      name: chat-completions
      description: REST surface for chat-completions.
      operations:
      - method: POST
        name: createchatcompletion
        description: Create chat completion
        call: chat-completions-chat-completions.createchatcompletion
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: chat-completions-chat-completions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mistral AI Chat Completions API — Chat Completions. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: create-chat-completion
      description: Create chat completion
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: chat-completions-chat-completions.createchatcompletion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
