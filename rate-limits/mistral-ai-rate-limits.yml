specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Mistral AI
providerId: mistral-ai
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Agents
  - Artificial Intelligence
  - Batch Processing
  - Chat
  - Embeddings
  - Fine-Tuning
  - Large Language Models
  - OCR
  - Rate Limiting
  - Quotas
  - Throttling
description: Machine-readable rate limit definitions for the Mistral AI API surface. Captures per-tier
  quotas, burst behavior, response signaling, and recovery semantics. Defaults are scaffold values to
  be replaced with published provider limits.
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
  retryAfter: Retry-After
  policy: RateLimit-Policy
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: free
    name: Free Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 10
    burst: 20
    timeFrame: minute
    applies:
      - Mistral AI Chat Completions API
      - Mistral AI Embeddings API
      - Mistral AI Agents API
      - Mistral AI Fine-Tuning API
      - Mistral AI OCR API
      - Mistral AI Models API
      - Mistral AI Forge API
      - Mistral AI Batch API
  - tier: free
    name: Free Tier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 1000
    timeFrame: month
    applies:
      - Mistral AI Chat Completions API
      - Mistral AI Embeddings API
      - Mistral AI Agents API
      - Mistral AI Fine-Tuning API
      - Mistral AI OCR API
      - Mistral AI Models API
      - Mistral AI Forge API
      - Mistral AI Batch API
  - tier: professional
    name: Professional Tier Default
    scope: api-key
    metric: requests_per_minute
    limit: 100
    burst: 200
    timeFrame: minute
    applies:
      - Mistral AI Chat Completions API
      - Mistral AI Embeddings API
      - Mistral AI Agents API
      - Mistral AI Fine-Tuning API
      - Mistral AI OCR API
      - Mistral AI Models API
      - Mistral AI Forge API
      - Mistral AI Batch API
  - tier: professional
    name: Professional Tier Monthly Quota
    scope: api-key
    metric: requests_per_month
    limit: 100000
    timeFrame: month
    applies:
      - Mistral AI Chat Completions API
      - Mistral AI Embeddings API
      - Mistral AI Agents API
      - Mistral AI Fine-Tuning API
      - Mistral AI OCR API
      - Mistral AI Models API
      - Mistral AI Forge API
      - Mistral AI Batch API
  - tier: enterprise
    name: Enterprise Negotiated Limit
    scope: contract
    metric: requests_per_minute
    limit: 1000
    burst: 5000
    timeFrame: minute
    applies:
      - Mistral AI Chat Completions API
      - Mistral AI Embeddings API
      - Mistral AI Agents API
      - Mistral AI Fine-Tuning API
      - Mistral AI OCR API
      - Mistral AI Models API
      - Mistral AI Forge API
      - Mistral AI Batch API
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter, honoring the Retry-After header
      when present.
  - name: Burst Handling
    description: Short bursts above the steady-state limit are tolerated up to the documented burst ceiling
      before throttling engages.
  - name: Quota Reset
    description: Monthly quotas reset at the start of each calendar month in UTC. Per-minute and per-second
      windows reset on a sliding-window basis.
  - name: Fair Use
    description: Even on uncapped enterprise tiers, sustained usage that materially impacts shared infrastructure
      may be subject to fair-use throttling.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
