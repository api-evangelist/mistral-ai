specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Mistral AI
providerId: mistral-ai
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - AI
  - Large Language Models
description: Mistral AI's la Plateforme exposes a chat-completions API at api.mistral.ai/v1 with
  per-account, per-model rate limits enforced as requests-per-second and tokens-per-minute. Specific
  per-tier numbers are not displayed on the public docs / pricing pages we sampled — they are surfaced
  in-product on the la Plateforme console and can be raised via support. 429 with Retry-After indicates
  throttling.
sources:
  - https://docs.mistral.ai/api/
  - https://mistral.ai/pricing
notes: Per-second / tokens-per-minute caps per tier are exposed only via the la Plateforme console;
  reconciliation deferred until those numbers are available.
headers:
  retryAfter: Retry-After
  ratelimitLimit: x-ratelimit-limit-requests
  ratelimitRemaining: x-ratelimit-remaining-requests
  ratelimitReset: x-ratelimit-reset-requests
  ratelimitTokensLimit: x-ratelimit-limit-tokens
  ratelimitTokensRemaining: x-ratelimit-remaining-tokens
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Requests per second (per model, per workspace)
    scope: account
    metric: requests_per_second
    limit: 'See la Plateforme console; not publicly published per tier'
  - name: Tokens per minute (per model, per workspace)
    scope: account
    metric: tokens_per_minute
    limit: 'See la Plateforme console; not publicly published per tier'
  - name: Concurrent requests
    scope: account
    metric: concurrent_requests
    limit: 'See la Plateforme console'
policies:
  - name: Honor Retry-After
    description: 429 responses include Retry-After (seconds). Honor the value before retrying with
      exponential backoff and jitter.
  - name: Per-model scoping
    description: Limits are enforced per-model — heavy use of one model does not throttle others
      unless the workspace-wide budget is hit.
  - name: Tier upgrades
    description: Higher per-tier rate limits are unlocked by adding a payment method and incurring
      usage; explicit limit raises can be requested via support.
  - name: Reasoning models
    description: Reasoning-effort settings can spike output tokens significantly; size token-per-minute
      caps for the worst case.
maintainers: []
