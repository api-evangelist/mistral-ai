specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Mistral AI
providerId: mistral-ai
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - AI
  - Large Language Models
  - Generative AI
  - Subscription
  - Usage-Based
description: Mistral AI sells two parallel commercial products. Le Chat is a tiered consumer / team
  subscription (Free, Pro $14.99/month, Team $24.99/month, Enterprise contact-sales). La Plateforme
  exposes pay-as-you-go API access to Mistral's models (Mistral Large 3, Medium 3.x, Small 4, Ministral
  3 series, Magistral, Codestral, Voxtral, OCR 3, Mistral Moderation 2, Devstral, etc.) priced per
  million input / output tokens. Per-model token prices are listed on the API pricing page but were
  not directly captured in this reconciliation pass — confirm against the live pricing tab on
  mistral.ai/pricing before relying on numbers downstream.
sources:
  - https://mistral.ai/pricing
  - https://docs.mistral.ai/getting-started/models/models_overview/
  - https://mistral.ai/products/la-plateforme
notes: Per-million-token API prices for individual models are documented on mistral.ai/pricing under
  the API tab but were not captured in this reconciliation; mark each entry "see vendor pricing page"
  until the table is fetched. Le Chat tier pricing is reconciled.
plans:
  - id: mistral-ai-le-chat-free
    name: Le Chat — Free
    type: freemium
    description: Free consumer chat tier with limited model and feature access.
    entries:
      - label: Per-user
        name: free_user
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: true
    elements:
      - name: Web chat access
      - name: Limited model selection
  - id: mistral-ai-le-chat-pro
    name: Le Chat — Pro
    type: subscription
    description: Consumer Pro tier; $14.99/month (monthly billing). Higher usage caps and additional
      features.
    entries:
      - label: Per-user monthly
        name: pro_monthly
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '14.99'
        userMultiplied: true
    elements:
      - name: Higher usage limits
      - name: Access to advanced features
  - id: mistral-ai-le-chat-team
    name: Le Chat — Team
    type: subscription
    description: Team plan; $24.99/user/month. Multi-user collaboration, shared workspaces.
    entries:
      - label: Per-user monthly
        name: team_monthly
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '24.99'
        userMultiplied: true
